name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly fuzz smoke run.
    - cron: "17 4 * * *"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  demo:
    name: end-to-end demo (record → offline replay)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install demo deps
        run: pip install -r examples/requirements.txt

      - name: Run end-to-end demo
        run: python examples/run_demo.py

      - name: Run MITM e2e (replay-only against recorded TLS cassette)
        run: python examples/run_mitm_demo.py

  fuzz:
    name: fuzz matcher (60s smoke)
    # On every push/PR we just smoke each target; the nightly cron does the same
    # job at the same budget but on a schedule, so regressions surface quickly.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz -> target"

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz matcher_compute (60s)
        working-directory: fuzz
        run: cargo +nightly fuzz run matcher_compute -- -max_total_time=60

      - name: Fuzz matcher_compare (60s)
        working-directory: fuzz
        run: cargo +nightly fuzz run matcher_compare -- -max_total_time=60
